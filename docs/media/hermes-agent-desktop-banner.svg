  <text x="876" y="446" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="15">1. 中文主界面，设置可切英文</text>
  <text x="876" y="470" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="15">2. GitHub 开源发布，保留 Hermes 命名</text>
