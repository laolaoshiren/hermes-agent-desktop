  <rect x="24" y="24" width="1232" height="592" rx="36" fill="url(#bg)"/>
  <rect x="24" y="24" width="1232" height="592" rx="36" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="1018" cy="106" r="112" fill="#1D4ED8" fill-opacity="0.18"/>
  <circle cx="1136" cy="526" r="148" fill="#10B981" fill-opacity="0.14"/>
  <circle cx="172" cy="540" r="124" fill="#F59E0B" fill-opacity="0.08"/>

  <rect x="88" y="78" width="202" height="40" rx="20" fill="rgba(255,255,255,0.08)"/>
  <text x="109" y="104" fill="#C7D2FE" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">Open Source • Hermes SEO</text>

  <text x="88" y="192" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="68" font-weight="800">Hermes Agent Desktop</text>
  <text x="88" y="246" fill="#A5B4FC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="600">Chinese-first desktop workspace for the Hermes agent ecosystem</text>

  <text x="88" y="322" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">针对中文用户优先设计，支持 English fallback，保留 Hermes 架构边界，</text>
  <text x="88" y="358" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">当前版本已支持真实流式模型调用、会话持久化、附件处理与 GitHub 开源发布。</text>

