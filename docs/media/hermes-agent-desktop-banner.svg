  <text x="553" y="446" fill="#F9FAFB" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">MIT License</text>

  <rect x="784" y="116" width="402" height="408" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
