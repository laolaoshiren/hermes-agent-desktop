<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hero" x1="90" y1="70" x2="1320" y2="830" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071421"/>
      <stop offset="0.58" stop-color="#0F2740"/>
      <stop offset="1" stop-color="#125046"/>
    </linearGradient>
    <linearGradient id="card-a" x1="122" y1="250" x2="656" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF8F1"/>
    </linearGradient>
    <linearGradient id="card-b" x1="784" y1="250" x2="1318" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="card-c" x1="122" y1="520" x2="656" y2="734" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="card-d" x1="784" y1="520" x2="1318" y2="734" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F3FF"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="#E5E7EB"/>
  <rect x="32" y="30" width="1376" height="840" rx="36" fill="url(#hero)"/>

  <circle cx="1222" cy="122" r="108" fill="#38BDF8" fill-opacity="0.15"/>
  <circle cx="1306" cy="794" r="168" fill="#22C55E" fill-opacity="0.12"/>
  <circle cx="122" cy="790" r="140" fill="#F59E0B" fill-opacity="0.08"/>

  <rect x="94" y="86" width="256" height="42" rx="21" fill="rgba(255,255,255,0.08)"/>
  <text x="122" y="113" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Hermes Ecosystem • Open Source • Desktop Product</text>

  <text x="94" y="192" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800">What ships in Hermes Agent Desktop</text>
  <text x="94" y="244" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">不是把 Hermes 生搬硬套到桌面，而是先把桌面产品完整度做好。</text>

  <rect x="94" y="288" width="566" height="188" rx="28" fill="url(#card-a)"/>
  <text x="128" y="336" fill="#047857" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">CHINESE-FIRST PRODUCT</text>
  <text x="128" y="382" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">中文优先，英文为辅</text>
  <text x="128" y="424" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="18">默认中文界面，设置内可切换 English。</text>
  <text x="128" y="454" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="18">更适合中文用户直接安装、直接配置、直接使用。</text>

  <rect x="780" y="288" width="566" height="188" rx="28" fill="url(#card-b)"/>
  <text x="814" y="336" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">MULTI-PLATFORM DELIVERY</text>
  <text x="814" y="382" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">一套仓库，三端发布</text>
  <text x="814" y="424" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="18">Windows 安装版 + 便携版，macOS dmg + zip，Linux AppImage + tar.gz。</text>
  <text x="814" y="454" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="18">GitHub Actions 负责 CI、打包和 release 交付。</text>

  <rect x="94" y="522" width="566" height="188" rx="28" fill="url(#card-c)"/>
  <text x="128" y="570" fill="#D97706" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">LOCAL QUALITY GATES</text>
  <text x="128" y="616" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">不是“感觉可用”，而是可验证</text>
  <text x="128" y="658" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="18">build、smoke、adapter E2E、Windows 安装包验证、GitHub release 校验都可本地执行。</text>
  <text x="128" y="688" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="18">问题能定位到接口、打包、工作流，而不只是“用户说有 bug”。</text>

  <rect x="780" y="522" width="566" height="188" rx="28" fill="url(#card-d)"/>
  <text x="814" y="570" fill="#7C3AED" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">HERMES-ORIENTED ARCHITECTURE</text>
  <text x="814" y="616" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">保留 Hermes 边界，不装作已全量打通</text>
  <text x="814" y="658" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="18">当前主路径是 direct-provider mode，未来继续推进 Hermes-native runtime bridge。</text>
  <text x="814" y="688" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="18">这样能先交付桌面产品，再逐步深化底层能力。</text>

  <rect x="94" y="758" width="1252" height="66" rx="22" fill="rgba(255,255,255,0.08)"/>
  <text x="126" y="800" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">OpenAI / OpenRouter / Anthropic / Ollama / OpenAI-compatible · Sessions · Attachments · Diagnostics · Updates · GitHub Releases</text>
</svg>
