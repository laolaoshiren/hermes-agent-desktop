name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            verify_windows_package: false
          - os: windows-latest
            verify_windows_package: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke Test
        run: npm run smoke

      - name: End-to-End Product Test
        run: npm run test:e2e

      - name: Verify Windows Package
        if: matrix.verify_windows_package
        shell: pwsh
        run: ./scripts/verify-win-package.ps1
