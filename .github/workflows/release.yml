name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            publish_args: --win nsis portable
            asset_glob: |
              release/*.exe
              release/latest.yml
          - os: macos-latest
            publish_args: --mac dmg zip
            asset_glob: |
              release/*.dmg
              release/*.zip
          - os: ubuntu-latest
            publish_args: --linux AppImage tar.gz
            asset_glob: |
              release/*.AppImage
              release/*.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke Test
        run: npm run smoke

      - name: Build Installers
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish never ${{ matrix.publish_args }}

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_glob }}
