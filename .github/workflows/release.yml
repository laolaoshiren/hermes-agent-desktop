name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            publish_args: --win nsis portable
            asset_glob: |
              release/*.exe
              release/latest.yml
          - os: macos-latest
            publish_args: --mac zip
            asset_glob: |
              release/*.zip
          - os: ubuntu-latest
            publish_args: --linux AppImage tar.gz
            asset_glob: |
              release/*.AppImage
              release/*.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke Test
        run: npm run smoke

      - name: End-to-End Product Test
        run: npm run test:e2e

      - name: Build Installers (macOS with retry)
        if: matrix.os == 'macos-latest'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npx electron-builder --publish never ${{ matrix.publish_args }}; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "macOS packaging failed after $attempt attempts."
              exit 1
            fi
            echo "macOS packaging attempt $attempt failed. Retrying in 30 seconds..."
            sleep 30
          done

      - name: Build Installers
        if: matrix.os != 'macos-latest'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish never ${{ matrix.publish_args }}

      - name: Verify Windows Package
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/verify-win-package.ps1 -SkipBuild

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_glob }}
